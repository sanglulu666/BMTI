    let currentIndex = 0;
    let userAnswers = new Array(questions.length).fill(null);
    let app = document.getElementById('app');
    let dynamicDiv = document.getElementById('dynamicContent');

    function renderStartPage() {
        dynamicDiv.innerHTML = `
            <div class="start-container">
                <div class="start-icon">🏸</div>
                <div class="start-title">羽球人格鉴定器</div>
                <div class="start-desc">

                    快来解锁你的专属羽毛球人格！
                </div>
                <button class="btn-start" id="startBtn">开始测试 →</button>
                <div style="margin-top: 24px; font-size: 0.75rem; color: #a5834e;">⚡ 共16种人格等你解锁</div>
            </div>
        `;
        document.getElementById('startBtn')?.addEventListener('click', () => {
            currentIndex = 0;
            userAnswers.fill(null);
            renderQuestion();
        });
    }

    function renderQuestion() {
        if (currentIndex >= questions.length) {
            calculateResult();
            return;
        }
        const q = questions[currentIndex];
        const progress = ((currentIndex) / questions.length) * 100;
        const letters = ['A', 'B', 'C', 'D'];
        let optionsHtml = '';
        q.opts.forEach((opt, idx) => {
            optionsHtml += `
                <div class="option-item" data-opt-index="${idx}">
                    <div class="option-prefix">${letters[idx]}</div>
                    <div class="option-text">${opt.text}</div>
                </div>
            `;
        });
        const hasPrev = currentIndex > 0;
        const hasNextOrFinish = userAnswers[currentIndex] !== null;
        dynamicDiv.innerHTML = `
            <div class="progress-area">
                <div class="progress-bar-bg"><div class="progress-fill" style="width: ${progress}%;"></div></div>
                <div class="question-counter">第 ${currentIndex+1} / ${questions.length} 题</div>
            </div>
            <div class="question-card">
                <div class="question-text">${q.text}</div>
                <div class="options-grid" id="optionsGrid">
                    ${optionsHtml}
                </div>
                <div class="nav-buttons">
                    <button class="btn btn-secondary" id="prevBtn" ${!hasPrev ? 'disabled' : ''}>← 上一题</button>
                    <button class="btn btn-primary" id="nextBtn" ${!hasNextOrFinish ? 'disabled' : ''}>${currentIndex === questions.length-1 ? '查看结果' : '下一题 →'}</button>
                </div>
            </div>
        `;
        // 绑定选项点击事件
        document.querySelectorAll('.option-item').forEach(el => {
            el.addEventListener('click', (e) => {
                const idx = parseInt(el.dataset.optIndex);
                userAnswers[currentIndex] = idx;
                // 更新下一题按钮状态
                const nextBtn = document.getElementById('nextBtn');
                if (nextBtn) nextBtn.disabled = false;
                // 高亮选中效果
                document.querySelectorAll('.option-item').forEach(opt => opt.style.background = 'white');
                el.style.background = '#ffe0b5';
            });
        });
        // 恢复高亮
        if (userAnswers[currentIndex] !== null) {
            const selectedIdx = userAnswers[currentIndex];
            const items = document.querySelectorAll('.option-item');
            if (items[selectedIdx]) items[selectedIdx].style.background = '#ffe0b5';
        }
        document.getElementById('prevBtn')?.addEventListener('click', () => {
            if (currentIndex > 0) {
                currentIndex--;
                renderQuestion();
            }
        });
        document.getElementById('nextBtn')?.addEventListener('click', () => {
            if (userAnswers[currentIndex] !== null) {
                if (currentIndex < questions.length - 1) {
                    currentIndex++;
                    renderQuestion();
                } else {
                    calculateResult();
                }
            } else {
                alert('请先选择一个选项～');
            }
        });
    }

    function calculateResult() {
        // 累加分数
        let totalScores = new Array(16).fill(0);
        for (let i = 0; i < questions.length; i++) {
            const answerIdx = userAnswers[i];
            if (answerIdx !== null) {
                const scores = questions[i].opts[answerIdx].scores;
                for (let j = 0; j < 16; j++) {
                    totalScores[j] += scores[j];
                }
            }
        }
        // 找出最高分人格
        let maxScore = -1;
        let bestIdx = 0;
        for (let i = 0; i < 16; i++) {
            if (totalScores[i] > maxScore) {
                maxScore = totalScores[i];
                bestIdx = i;
            }
        }
        const resultPersonality = PERSONALITIES[bestIdx];
        // 渲染结果页面，支持插入图片（需要自己放置图片，文件命名规则为 id.png 或 id.jpg）
        // 默认图片路径请替换为自己的，这里示例使用占位符
        const imgSrc = `images/${resultPersonality.id}.jpg`;  // 请将图片放在 images/ 目录下，命名为 GFXM.png 等
        dynamicDiv.innerHTML = `
            <div class="result-container">
                <div class="result-avatar">
                    <img src="${imgSrc}" alt="${resultPersonality.name}" onerror="this.src='https://via.placeholder.com/160x160?text=🏸'">
                </div>
                <div class="result-name">${resultPersonality.name}</div>
                <div class="result-desc">${resultPersonality.desc}</div>
                <button class="restart-btn" id="restartBtn">重新测试 🔄</button>
            </div>
        `;
        document.getElementById('restartBtn')?.addEventListener('click', () => {
            currentIndex = 0;
            userAnswers.fill(null);
            renderStartPage();
        });
    }
